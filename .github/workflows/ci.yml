name: Hello Platform Service CI

on:
  pull_request:
    branches: [ develop, main, 'release/**' ]
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  id-token: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set_env.outputs.env_name }}
      tf_dir: ${{ steps.set_env.outputs.tf_dir }}
      app_version: ${{ steps.project_version.outputs.app_version }}
    steps:
      - name: Check Source Branch for Main Merge
        if: github.base_ref == 'main'
        run: |
          if [[ ! "${{ github.head_ref }}" =~ ^release/ ]] || [[ "$SOURCE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "ERROR: Merges to main are ONLY allowed from release/** branches or version tags (v*)."
            exit 1
          fi
      - id: set_env
        run: |
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.base_ref }}" == "main" ]]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
            echo "tf_dir=terraform" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == release/* || "${{ github.base_ref }}" == release/* ]]; then
            echo "env_name=qa" >> $GITHUB_OUTPUT
            echo "tf_dir=terraform" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
            echo "tf_dir=terraform" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Maven Version
        id: project_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          # Create files for the CD pipeline to consume
          echo "$VERSION" > app_version.txt
          echo "${{ steps.set_env.outputs.env_name }}" > env_name.txt

      - name: Upload Metadata
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-metadata
          path: |
            app_version.txt
            env_name.txt

  terraform-validate:
    needs: [ setup ]
    runs-on: ubuntu-latest
    environment: qa
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      # Step 1: Checkout the main repo so GitHub can find the local action
      - name: Checkout to access local action
        uses: actions/checkout@v4

      # Step 2: Run the local action and pass the necessary GCP variables
      - name: Common Setup
        uses: ./.github/workflows/cd-actions/tf-setup
        with:
          wif_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CD_SA_EMAIL }}

      - name: Terraform Format Check
        run: |
          cd ${{ needs.setup.outputs.tf_dir }}
          terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          cd ${{ needs.setup.outputs.tf_dir }}
          terraform init -backend=false
          terraform validate

  test-and-scan:
    needs: [ setup, terraform-validate ]
    environment: ${{ needs.setup.outputs.env_name }}
    runs-on: ubuntu-latest

    env:
      # Full registry path for consistency
      FULL_IMAGE_PATH: ${{ vars.REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/hello-platform-artifact-registry/${{ vars.IMAGE_NAME }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven Checkstyle
        run: mvn checkstyle:check

      - name: Run Unit Tests
        run: mvn clean test

      # Build and Load locally so Trivy can see it
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and Export Image
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: local-image:latest
          outputs: type=docker,dest=/tmp/image.tar
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            APP_VERSION=${{ needs.setup.outputs.app_version }}

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

      - name: Run Trivy Scanner (on exported file)
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '1'

  promote-container-to-nonprod-registry:
    needs: [ setup, test-and-scan ]
    if: (github.event_name == 'pull_request' && github.base_ref == 'develop') || (github.event_name == 'push' && startsWith(github.ref_name, 'release/'))
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.env_name }}
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Image
        run: docker load --input /tmp/image.tar

      - name: GCP Auth (Keyless via WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ vars.REGISTRY_REGION }}-docker.pkg.dev

      - name: Retag and Push
        run: |
          IMAGE_PATH="${{ vars.REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/hello-platform-artifact-registry/${{ vars.IMAGE_NAME }}"
          
          docker tag local-image:latest $IMAGE_PATH:${{ github.sha }}
          docker tag local-image:latest $IMAGE_PATH:${{ needs.setup.outputs.app_version }}
          
          docker push $IMAGE_PATH:${{ github.sha }}
          docker push $IMAGE_PATH:${{ needs.setup.outputs.app_version }}

  get-qa-metadata:
    needs: [ test-and-scan ]
    if: github.ref_name == 'main' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    environment: qa # This gives us access to QA's vars.GCP_PROJECT_ID
    outputs:
      qa_project_id: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - run: echo "Fetching QA Project ID for promotion..."


    # New job to handle versioning when we skip the full build
  promote-container-to-prod-registry:
    needs: [ setup, get-qa-metadata ]
    if: github.ref_name == 'main' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Copy Image from QA to Prod
        run: |
          # Define source (QA) and destination (Prod)
          # Note: You may need to hardcode the QA project ID or use a specific secret if it differs from the Prod context
          SOURCE_IMAGE="${{ vars.REGISTRY_REGION }}-docker.pkg.dev/${{ needs.get-qa-metadata.outputs.qa_project_id }}/hello-platform-artifact-registry/${{ vars.IMAGE_NAME }}:${{ needs.setup.outputs.app_version }}"
          DEST_IMAGE="${{ vars.REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/hello-platform-artifact-registry/${{ vars.IMAGE_NAME }}:${{ needs.setup.outputs.app_version }}"
          
          # Standardize the auth for both registries
          gcloud auth configure-docker ${{ vars.REGISTRY_REGION }}-docker.pkg.dev --quiet
          
          echo "Pulling from QA..."
          docker pull "$SOURCE_IMAGE"
          
          echo "Tagging for Prod..."
          docker tag "$SOURCE_IMAGE" "$DEST_IMAGE"
          
          echo "Pushing to Prod..."
          docker push "$DEST_IMAGE"